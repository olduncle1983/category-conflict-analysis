<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>视频号/公众号互选 25Q2 vs 26Q2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:white;padding:20px 32px}
.header h1{font-size:20px;margin-bottom:4px}
.header p{font-size:12px;opacity:.8}
.summary{display:flex;gap:12px;padding:16px 32px;background:white;border-bottom:1px solid #e8e8e8;flex-wrap:wrap}
.sc{flex:1;min-width:160px;background:#f8f9fa;border-radius:8px;padding:14px 18px}
.sc .l{font-size:12px;color:#888;margin-bottom:4px}
.sc .v{font-size:20px;font-weight:700}
.sc .d{font-size:12px;margin-top:4px}
.up{color:#52c41a}.down{color:#f5222d}
.ctrl{padding:14px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:white;border-bottom:1px solid #e8e8e8}
.ctrl input{padding:8px 14px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;width:240px}
.ctrl select{padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px}
.tw{padding:0 32px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:white;font-size:13px}
th{padding:9px 11px;text-align:right;border-bottom:2px solid #e8e8e8;font-weight:600;color:#555;white-space:nowrap;background:#fafafa}
th:first-child,td:first-child{text-align:left}
td{padding:8px 11px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f6f9ff}
.rk{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.rk1{background:#fff1f0;color:#f5222d}.rk2{background:#fff7e6;color:#fa8c16}.rk3{background:#f6ffed;color:#52c41a}.rkn{background:#f5f5f5;color:#999}
.n{font-variant-numeric:tabular-nums}.neg{color:#f5222d;font-weight:600}.pos{color:#52c41a}.zero{color:#aaa}
.note{padding:10px 32px 20px;font-size:12px;color:#999}
</style>
</head>
<body>
<div class="header">
  <h1>视频号互选 &amp; 公众号互选 — 25Q2 vs 26Q2 收入对比</h1>
  <p>数据来源：食品饮料业绩-0614+月会材料底数.xlsx · 主计_业绩详表_data-5 · Q2季度</p>
</div>
<div class="summary" id="sum"></div>
<div class="ctrl">
  <input type="text" id="sr" placeholder="搜索客户名称..." oninput="render()">
  <select id="flt" onchange="render()">
    <option value="down">收入减少（降幅排序）</option>
    <option value="up">收入增加（增幅排序）</option>
    <option value="all">全部客户</option>
  </select>
</div>
<div class="tw">
<table>
<thead><tr>
  <th style="width:44px">#</th><th>客户简称</th>
  <th>视频号25Q2(万)</th><th>视频号26Q2(万)</th><th>视频号变化</th>
  <th>公众号25Q2(万)</th><th>公众号26Q2(万)</th><th>公众号变化</th>
  <th><b>合计25Q2(万)</b></th><th><b>合计26Q2(万)</b></th>
  <th><b>合计变化(万)</b></th>
</tr></thead>
<tbody id="tb"><tr><td colspan="11" style="text-align:center;color:#999;padding:40px">加载中...</td></tr></tbody>
</table>
</div>
<div class="note">注：数据仅含「互选视频号」和「互选公众号」；变化 = 26Q2 − 25Q2，负值=收入减少。</div>
<script src="huxuan_data.js"></script>
<script>
function fmt(v){return(v/10000).toFixed(1);}
function cls(v){return v>0?'pos':v<0?'neg':'zero';}
function rcls(i){if(i===0)return'rk1';if(i===1)return'rk2';if(i===2)return'rk3';return'rkn';}
function render(){
  if(typeof HUXUAN_DATA==='undefined')return;
  const q=document.getElementById('sr').value.trim().toLowerCase();
  const f=document.getElementById('flt').value;
  let data=[...HUXUAN_DATA];
  if(q)data=data.filter(r=>r[0].toLowerCase().includes(q));
  if(f==='down')data=data.filter(r=>r[7]<0).sort((a,b)=>a[7]-b[7]);
  else if(f==='up')data=data.filter(r=>r[7]>0).sort((a,b)=>b[7]-a[7]);
  const sv25=HUXUAN_DATA.reduce((s,r)=>s+r[1],0);
  const sv26=HUXUAN_DATA.reduce((s,r)=>s+r[2],0);
  const sg25=HUXUAN_DATA.reduce((s,r)=>s+r[3],0);
  const sg26=HUXUAN_DATA.reduce((s,r)=>s+r[4],0);
  const st25=sv25+sg25,st26=sv26+sg26;
  document.getElementById('sum').innerHTML=
    '<div class="sc"><div class="l">视频号25Q2</div><div class="v">'+(sv25/10000).toFixed(1)+'万</div></div>'+
    '<div class="sc"><div class="l">视频号26Q2</div><div class="v">'+(sv26/10000).toFixed(1)+'万</div><div class="d '+(sv26>=sv25?'up':'down')+'">'+(sv26>=sv25?'▲':'▼')+Math.abs((sv26-sv25)/10000).toFixed(1)+'万</div></div>'+
    '<div class="sc"><div class="l">公众号25Q2</div><div class="v">'+(sg25/10000).toFixed(1)+'万</div></div>'+
    '<div class="sc"><div class="l">公众号26Q2</div><div class="v">'+(sg26/10000).toFixed(1)+'万</div><div class="d '+(sg26>=sg25?'up':'down')+'">'+(sg26>=sg25?'▲':'▼')+Math.abs((sg26-sg25)/10000).toFixed(1)+'万</div></div>'+
    '<div class="sc" style="background:#e8f0fe"><div class="l">合计变化</div><div class="v '+(st26>=st25?'up':'down')+'">'+(st26>=st25?'+':'')+((st26-st25)/10000).toFixed(1)+'万</div></div>';
  let h='';
  data.forEach((r,i)=>{
    const vc=r[2]-r[1],gc=r[4]-r[3];
    h+='<tr>'+
      '<td><span class="rk '+rcls(i)+'">'+(i+1)+'</span></td>'+
      '<td>'+r[0]+'</td>'+
      '<td class="n">'+fmt(r[1])+'</td>'+
      '<td class="n">'+fmt(r[2])+'</td>'+
      '<td class="n '+cls(vc)+'">'+(vc>0?'+':'')+(vc/10000).toFixed(1)+'</td>'+
      '<td class="n">'+fmt(r[3])+'</td>'+
      '<td class="n">'+fmt(r[4])+'</td>'+
      '<td class="n '+cls(gc)+'">'+(gc>0?'+':'')+(gc/10000).toFixed(1)+'</td>'+
      '<td class="n" style="font-weight:600">'+fmt(r[5])+'</td>'+
      '<td class="n" style="font-weight:600">'+fmt(r[6])+'</td>'+
      '<td class="n '+cls(r[7])+'" style="font-weight:700">'+(r[7]>0?'+':'')+(r[7]/10000).toFixed(1)+'</td>'+
      '</tr>';
  });
  if(!h)h='<tr><td colspan="11" style="text-align:center;color:#999;padding:40px">无匹配结果</td></tr>';
  document.getElementById('tb').innerHTML=h;
}
render();
</script>
</body>
</html>
